<div class="container mt-4">
  <h2>Nueva Venta</h2>
  <form [formGroup]="ventaForm" (ngSubmit)="guardarVenta()">
    
    <div class="mb-3">
      <label>Cliente:</label>
      <select class="form-control" formControlName="clienteId">
        <option [value]="null">Seleccione un cliente...</option>
        <option *ngFor="let c of clientes" [value]="c.id">{{c.nombre}}</option>
      </select>
    </div>

    <h4>Productos</h4>
    <table class="table table-bordered">
      <thead>
        <tr>
          <th>Producto</th>
          <th>Cantidad</th>
          <th>Precio Unit.</th>
          <th>Subtotal</th>
          <th>Acción</th>
        </tr>
      </thead>
      <tbody formArrayName="detalles">
        <tr *ngFor="let item of detalles.controls; let i=index" [formGroupName]="i">
          <td>
            <select class="form-control" formControlName="productoId" (change)="onProductoChange(i)">
              <option [value]="null">Seleccione...</option>
              <option *ngFor="let p of productos" [value]="p.id">{{p.nombre}} (Stock: {{p.stock}})</option>
            </select>
          </td>
          <td>
            <input type="number" class="form-control" formControlName="cantidad" (input)="actualizarSubtotal(i)">
          </td>
          <td>${{ item.get('precio')?.value }}</td>
          <td>${{ item.get('subtotal')?.value }}</td>
          <td>
            <button type="button" class="btn btn-danger" (click)="removerProducto(i)">Eliminar</button>
          </td>
        </tr>
      </tbody>
    </table>

    <button type="button" class="btn btn-primary" (click)="agregarProducto()">+ Agregar Producto</button>

    <div class="text-end mt-3">
      <h3>Total General: ${{ totalGeneral }}</h3>
    </div>

    <hr>
    <button type="submit" class="btn btn-success btn-lg" [disabled]="ventaForm.invalid">REGISTRAR VENTA</button>
  </form>
</div>
